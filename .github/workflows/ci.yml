name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

# 같은 브랜치의 이전 실행은 취소 (중복 러너 절약)
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # lint/type-check는 번들 바이너리(ffmpeg/yt-dlp/streamlink) 불필요 →
      # postinstall(setup-deps.mjs) 및 네이티브 빌드 스킵으로 빠르고 안정적.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      # ESLint: --max-warnings 0 (prettier/prettier 포함) → 포맷·경고 0 강제
      - name: Lint
        run: npm run lint

      # 앞 단계 실패해도 타입 에러까지 함께 보고
      - name: Type check
        if: ${{ !cancelled() }}
        run: npm run type-check
